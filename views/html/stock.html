    class="p-5 text-center bg-image d-flex flex-column min-vh-100 " style="background-image: url('https://images.pexels.com/photos/4312849/pexels-photo-4312849.jpeg');" 
  >
  <!-- BACKGROUD IMAGE -->
   
    <div class="mask mask-custom" style="background-color: rgba(25, 12, 36, 0.7);">
    <!-- main body -->
<div class="container-fluid main-body">
      <div class="row">
    <!-- Sidebar -->
    <div class=" col-md-4 col-lg-2 bg-light p-2 border-end ">

    <!-- Title -->
    <h5 class="mb-4 fw-bold">Explore More</h5>

    <!-- Sidebar Navigation Buttons -->
    <div class="d-grid gap-3">

        <a href="index.html" class="btn btn-outline-secondary">

        </div>
    
</div>
      <!-- End of sidebar -->

      <!-- Section for main content -->
           <form class="col p-4 m-4 overflow-y-auto">
      <div >
          <!-- Product information -->
          <h3 class="text-center fw-bold text-white"><u>STOCK REGISTRATION</u></h3>
         
          <div class="row g-3">
            <div class="col">
              <label for="product name" class="form-label text-white">Product Name:</label>
              <select class="form-select" aria-label="Default select example">
                <option selected>Choose option below</option>
                <option value="kg">Cement</option>
                <option value="g">Nails</option>
                <option value="pc">Varnish</option>
                <option value="bg">Paint</option>
                <option value="crt">Angle bars</option>
                <option value="t">Hinge</option>
                <option value="ltr">Iron bars</option>
                <option value="ml">Thinners</option>
                <option value="ml">Sealant</option>
                <option value="ml">Roofing sheets</option>
                <option value="ml">Tarpaulins</option>
                <option value="ml">Wire mesh</option>
                <option value="ml">Paint brush</option>
                <option value="ml">Y16</option>
              </select>
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Product Code:</label>
              <input name="productCode" type="text" class="form-control" placeholder="" aria-label="productCode">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Product Type:</label>
              <select class="form-select" aria-label="Default select example">
                <option selected>Choose option below</option>
                <option value="">Building Materials</option>
                <option value="">Hand Tools</option>
                <option value="">Power Tools</option>
                <option value="">Plumbing Supplies</option>
                <option value="">Electrical Supplies</option>
                <option value="">Paint & Finishing Materials</option>
                <option value="">Doors, Windows & Fittings</option>
                <option value="">Carpentry</option>
                <option value="">Fastners & Fixings</option>
                <option value="">Safety Equipment</option>
              </select>
            </div>
          </div>
          <!-- Stock details -->
          <div class="row g-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Quantity:</label>
              <input type="number" class="form-control" placeholder="" aria-label="First name">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Unit of Measure:</label>

              <select class="form-select" aria-label="Default select example">
                <option selected>Choose option below</option>
                <option value="kg">Kilogram (kg)</option>
                <option value="g">Gram (g)</option>
                <option value="pc">Piece(s)</option>
                <option value="bg">Bag(s)</option>
                <option value="crt">Carton</option>
                <option value="t">Box</option>
                <option value="ltr">Litre (L)</option>
                <option value="ml">Millilitre (ml)</option>
              </select>
            </div>
          </div>
          <!-- End of stock details -->
          <div class="row g-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Supplier Name:</label>
              <input name="supplierName" type="text" class="form-control" placeholder="Enter name here" aria-label="supplierName">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Phone Number:</label>
              <input name="phoneNumber" type="tel" class="form-control" placeholder="+2567xxxxxxxx" aria-label="Number">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Email:</label>
              <input name="email" type="email" class="form-control" placeholder="youremail@example.com" aria-label="Email">
            </div>
          </div>

          <!-- Pricing -->
          <div class="row g-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Cost Price:</label>
              <input name="costPrice" type="text" class="form-control" aria-label="costPrice">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Transport Cost:</label>
              <input name="tpCost" type="tel" class="form-control"  aria-label="Number">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label text-white">Selling Price:</label>
              <input name="sellingPrice" type="email" class="form-control" placeholder="youremail@example.com" aria-label="Email">
            </div>
          </div> 
        </div>
            <!-- submission -->
            <h3 class="text-center fw-bold my-3 text-white">Comments</h3>
            <div >
              <div class="col">
                <div class="form-floating">
                  <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2"
                    style="height: 100px"></textarea>
                  <label for="floatingTextarea2">Write your comment here ...</label>
                </div>
              </div>
            </div>
            <!-- End of submission -->
            <!-- Buttons -->
            <div class="row g-3">
             
              <div class="col">
                <input class="btn btn-warning btn-lg w-20 mt-3" type="submit" value="Register Stock">
              </div>

            </div>
      
    </form>
  </div>
  </div>
</div>

    <script type="text/javascript"></script>

</html>
