      <!-- Section for main content -->
      <div class="col bg-body-tertiary p-4 m-4">
        <form>
          <!-- Product information -->
          <h2 class="text-center fw-bold"><u>Stock Registration</u></h2>
          <h3 class="text-center fw-bold"> Product Information</h3>
          <div class="row g-3 my-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Product Name:</label>
              <input type="text" class="form-control" placeholder="Enter name" aria-label="First name">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Product Code:</label>
              <input type="text" class="form-control" placeholder="" aria-label="Last name">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Product type:</label>
              <select class="form-select" aria-label="Default select example">
                <option selected>Choose option below</option>
                <option value="">Building Materials</option>
                <option value="">Hand Tools</option>
                <option value="">Power Tools</option>
                <option value="">Plumbing Supplies</option>
                <option value="">Electrical Supplies</option>
                <option value="">Paint & Finishing Materials</option>
                <option value="">Doors, Windows & Fittings</option>
                <option value="">Carpentry</option>
                <option value="">Fastners & Fixings</option>
                <option value="">Safety Equipment</option>
              </select>
            </div>
          </div>

          <!-- Stock details -->
          <h3 class="text-center fw-bold">Stock Details</h3>
          <div class="row g-3 my-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Quantity:</label>
              <input type="number" class="form-control" placeholder="" aria-label="First name">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Unit of Measure:</label>

              <select class="form-select" aria-label="Default select example">
                <option selected>Choose option below</option>
                <option value="kg">Kilogram (kg)</option>
                <option value="g">Gram (g)</option>
                <option value="pc">Piece (pcs)</option>
                <option value="b">Box</option>
                <option value="crt">Carton</option>
                <option value="t">Tray</option>
                <option value="ltr">Litre (L)</option>
                <option value="ml">Millilitre (ml)</option>
              </select>
            </div>
          </div>
          <!-- End of stock details -->

          <!-- Supplier details -->
          <h3 class="text-center fw-bold">Supplier Details</h3>
          <div class="row g-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Supplier Name:</label>
              <input type="text" class="form-control" placeholder="Enter name here" aria-label="First name">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Phone Number:</label>
              <input type="tel" class="form-control" placeholder="+2567xxxxxxxx" aria-label="Number">
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Email:</label>
              <input type="email" class="form-control" placeholder="youremail@example.com" aria-label="Email">
            </div>
          </div>
          <!-- End of supplier details  -->
          <!-- pricing -->
          <h3 class="text-center fw-bold">Pricing</h3>
          <div class="row g-3 my-3">
            <div class="col">
               <label class="form-label">Cost Price:</label>
           
             <div class="input-group">
           
            <span class="input-group-text" id="basic-addon1">

              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                class="bi bi-currency-dollar" viewBox="0 0 16 16">
            
                <path
                  d="M4 10.781c.148 1.667 1.513 2.85 3.591 3.003V15h1.043v-1.216c2.27-.179 3.678-1.438 3.678-3.3 0-1.59-.947-2.51-2.956-3.028l-.722-.187V3.467c1.122.11 1.879.714 2.07 1.616h1.47c-.166-1.6-1.54-2.748-3.54-2.875V1H7.591v1.233c-1.939.23-3.27 1.472-3.27 3.156 0 1.454.966 2.483 2.661 2.917l.61.162v4.031c-1.149-.17-1.94-.8-2.131-1.718zm3.391-3.836c-1.043-.263-1.6-.825-1.6-1.616 0-.944.704-1.641 1.8-1.828v3.495l-.2-.05zm1.591 1.872c1.287.323 1.852.859 1.852 1.769 0 1.097-.826 1.828-2.2 1.939V8.73z">
                </path>
              </svg>
              
            </span>
            <input type="text" class="form-control" placeholder="" aria-label="input GroupExample">
             </div>
            </div>
            

            <!-- dollar sign input -->
             <div class="col">

              <label class="form-label">Selling Price:</label>

            <div class="input-group">
              <span class="input-group-text" id="basic-addon1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                  class="bi bi-currency-dollar" viewBox="0 0 16 16">

                  <path
                    d="M4 10.781c.148 1.667 1.513 2.85 3.591 3.003V15h1.043v-1.216c2.27-.179 3.678-1.438 3.678-3.3 0-1.59-.947-2.51-2.956-3.028l-.722-.187V3.467c1.122.11 1.879.714 2.07 1.616h1.47c-.166-1.6-1.54-2.748-3.54-2.875V1H7.591v1.233c-1.939.23-3.27 1.472-3.27 3.156 0 1.454.966 2.483 2.661 2.917l.61.162v4.031c-1.149-.17-1.94-.8-2.131-1.718zm3.391-3.836c-1.043-.263-1.6-.825-1.6-1.616 0-.944.704-1.641 1.8-1.828v3.495l-.2-.05zm1.591 1.872c1.287.323 1.852.859 1.852 1.769 0 1.097-.826 1.828-2.2 1.939V8.73z">
                  </path>
                </svg>
              </span>

              <input type="text" class="form-control" placeholder="" aria-label="input GroupExample">
              </div>
            </div>
        </div>
            <!-- end of pricing -->

            <!-- submission -->
            <h3 class="text-center fw-bold">Comments</h3>
            <div class="row g-3 my-3">

                <div class="form-floating">
                  <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2"
                    style="height: 100px"></textarea>
                  <label for="floatingTextarea2">Leave a comment here</label>
                </div>
              </div>
            </div>
            <!-- End of submission -->

            <!-- Buttons -->
            <div class="row g-3">
             
              <div class="col">
                <input class="btn btn-primary btn-lg w-100 mt-3" type="submit" value="Register Stock">
              </div>
