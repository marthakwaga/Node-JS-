<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Sale - Nyondo Hardware</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="/css/mdb.min.css" />
  <link rel="stylesheet" href="/nyondo.css">
</head>

<body>
  <div class="bg-image d-flex align-items-center justify-content-center min-vh-100 p-4" 
       id="intro-example" 
       style="background-image: url('https://images.pexels.com/photos/4312849/pexels-photo-4312849.jpeg');">

    <div class="mask mask-custom" style="background-color: rgba(25, 12, 36, 0.78);">

      <div class="d-flex  align-items-center h-100">
        
          <!-- Sidebar -->
        <nav class="sidebar p-3 text-white flex-shrink-0" style="width: 260px; background: rgba(242, 240, 242, 0.336);">
          <div class="logo mx-auto mb-4" 
               style="background-image: url('/public/images/logo.png'); width: 150px; height: 150px; background-size: contain; background-repeat: no-repeat;"></div>

          <ul class="nav flex-column">
            <li class="nav-item"><a href="dashboard.html" class="nav-link text-white"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="nav-item"><a href="products.html" class="nav-link text-white"><i class="fas fa-boxes"></i> Products & Stock</a></li>
            <li class="nav-item"><a href="stock-in.html" class="nav-link text-white"><i class="fas fa-truck-loading"></i> Stock In</a></li>
            <li class="nav-item"><a href="sales.html" class="nav-link text-white"><i class="fas fa-shopping-cart"></i> Sales</a></li>
            <li class="nav-item"><a href="deposits.html" class="nav-link text-white"><i class="fas fa-hand-holding-usd"></i> Deposit Scheme</a></li>
            <li class="nav-item"><a href="suppliers.html" class="nav-link text-white"><i class="fas fa-users"></i> Suppliers</a></li>
            <li class="nav-item"><a href="reports.html" class="nav-link text-white"><i class="fas fa-chart-bar"></i> Reports</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-white active"><i class="fas fa-file-invoice-dollar"></i> Expenses</a></li>
            <li class="nav-item"><a href="offline.html" class="nav-link text-white"><i class="fas fa-wifi"></i> Offline Mode</a></li>
          </ul>
          <button onclick="logout()" class="btn btn-outline-light w-100 mt-4">Logout</button>
        </nav>
        
        <div class="card shadow-lg" style="max-width: 780px; width: 100%; background: rgba(255, 255, 255, 0.062); backdrop-filter: blur(12px);">
          
          <div class="card-header bg-warning text-dark text-center py-4">
            <h4 class="mb-0"><i class="fas fa-cash-register me-2"></i> New Sale</h4>
          </div>

          <div class="card-body p-2">

            <form id="saleForm">
              <div class="row mb-4">
                <div class="col-md-4">
                  <label class="form-label fw-bold text-white">Sale Date</label>
                  <input name="saleDate" type="date" id="saleDate" class="form-control" value="2026-05-02">
                </div>
                <div class="col-md-5">
                  <label class="form-label fw-bold text-white">Sales Representative</label>
                  <select id="representative" class="form-select">
                    <option value="">Select Representative</option>
                    <option value="Martha">Martha Kwaga</option>
                    <option value="John">John Tendo</option>
                    <option value="Sarah">Sarah Nansubuga</option>
                    <option value="Robert">Robert Kizza</option>
                    <option value="Grace">Grace Nakato</option>
                  </select>
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-bold text-white">Customer Phone</label>
                  <input name="customerPhone" type="tel" id="customerPhone" class="form-control" placeholder="+256">
                </div>
              </div>

              <!-- Add Product -->
              <div class="border rounded-3 p-4 mb-4 bg-light">
                <h5 class="mb-3 text-success">Add Product to Sale</h5>
                <div class="row g-3">
                  <div class="col-md-5">
                    <label class="form-label">Product</label>
                    <select id="productSelect" class="form-select" onchange="autoFillPrice()">
                      <option value="">Select Product</option>
                      <option value="Cement 50kg" data-code="CEM001" data-price="25000">Cement</option>
                      <option value="Roofing Sheet" data-code="ROF002" data-price="45000">Roofing Sheet</option>
                      <option value="Binding Wire Roll" data-code="BWR003" data-price="12000">Binding Wire Roll</option>
                      <option value="Emulsion Paint 20L" data-code="PAI004" data-price="85000">Emulsion Paint 20L</option>
                      <option value="Electrical Wire 1.5mm" data-code="WIR005" data-price="35000">1.5mm Electrical Wire</option>
                      <option value="PVC Pipe 4m" data-code="PIP006" data-price="18000">PVC Pipe 4m</option>
                    </select>
                  </div>
                  <div class="col-md-2">
                    <label class="form-label">Code</label>
                    <input type="text" id="productCode" class="form-control text-center fw-bold" readonly>
                  </div>
                  <div class="col-md-2">
                    <label class="form-label">Qty</label>
                    <input type="number" id="qty" class="form-control" value="1" min="1">
                  </div>
                  <div class="col-md-2">
                    <label class="form-label">Unit Price</label>
                    <input type="number" id="unitPrice" class="form-control">
                  </div>
                  <div class="col-md-1 d-flex align-items-end">
                    <button type="button" onclick="addItem()" class="btn btn-success w-100">
                      <i class="fas fa-plus"></i>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Scrollable Items Table -->
              <h5 class="mb-3 text-warning">Items Added</h5>
              <div class="table-responsive" style="max-height: 320px; overflow-y: auto;">
                <table class="table table-hover align-middle" id="itemsTable">
                  <thead class="table-dark sticky-top">
                    <tr>
                      <th>Code</th>
                      <th>Product</th>
                      <th class="text-center">Qty</th>
                      <th class="text-end">Unit Price</th>
                      <th class="text-end">Total</th>
                    </tr>
                  </thead>
                  <tbody id="itemsBody"></tbody>
                </table>
              </div>

              <!-- Grand Total -->
              <div class="d-flex justify-content-between align-items-center p-4 bg-light rounded-3 mt-4">
                <h4 class="mb-0 fw-bold">Grand Total</h4>
                <h2 class="mb-0 text-success fw-bold" id="grandTotal">UGX 0</h2>
              </div>

              <div class="text-center mt-2">
                <button type="submit" class="btn btn-warning btn-lg px-2 me-1">Save Sale</button>
                <a href="sales.html" class="btn btn-outline-secondary btn-lg">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.js"></script>

  <script>
    let items = [];

    function autoFillPrice() {
      const select = document.getElementById('productSelect');
      const option = select.options[select.selectedIndex];
      if (option.value) {
        document.getElementById('productCode').value = option.dataset.code;
        document.getElementById('unitPrice').value = option.dataset.price;
      }
    }

    function addItem() {
      const product = document.getElementById('productSelect').value;
      const code = document.getElementById('productCode').value;
      const qty = parseFloat(document.getElementById('qty').value) || 0;
      const price = parseFloat(document.getElementById('unitPrice').value) || 0;

      if (!product || qty <= 0 || price <= 0) {
        alert("Please select a product and fill quantity & price");
        return;
      }

      items.push({ code, product, qty, price, total: qty * price });
      renderTable();
      calculateGrandTotal();
      clearInputs();
    }

    function renderTable() {
      const tbody = document.getElementById('itemsBody');
      tbody.innerHTML = '';

      items.forEach((item, index) => {
        tbody.innerHTML += `
          <tr>
            <td><strong>${item.code}</strong></td>
            <td>${item.product}</td>
            <td class="text-center">${item.qty}</td>
            <td class="text-end">${item.price.toLocaleString()}</td>
            <td class="text-end fw-bold">${item.total.toLocaleString()}</td>
            <td class="text-center">
              <button onclick="removeItem(${index})" class="btn btn-sm btn-outline-danger">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>`;
      });
    }

    function removeItem(index) {
      items.splice(index, 1);
      renderTable();
      calculateGrandTotal();
    }

    function calculateGrandTotal() {
      const total = items.reduce((sum, item) => sum + item.total, 0);
      document.getElementById('grandTotal').textContent = `UGX ${total.toLocaleString()}`;
    }

    function clearInputs() {
      document.getElementById('productSelect').value = '';
      document.getElementById('productCode').value = '';
      document.getElementById('qty').value = '1';
      document.getElementById('unitPrice').value = '';
    }

    document.getElementById('saleForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (items.length === 0) return alert("Please add at least one item");
      alert("✅ Sale saved successfully!");
    });
  </script>
</body>
</html>
