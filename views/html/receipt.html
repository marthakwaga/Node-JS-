<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nyondo Receipt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/public/css/stocklist.css" rel="stylesheet"/>
  <style>
    body { font-family: 'Courier New', monospace; background: #f8f9fa; }
    .receipt {
      max-width: 400px;
      margin: 20px auto;
      background: white;
      padding: 25px;
      border: 2px dashed #000;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="receipt ">
    <div class="logo">
      <img src="/images/logo.png" alt="Nyondo" style="height: 55px;;">
    </div>
    <div >
         <small>Mbale • Tel: 0782 123 456</small>
    </div>

    <div class="text-center border-bottom pb-2 mb-3">
      <h5>OFFICIAL SALES RECEIPT</h5>
      <small id="receiptDate"></small>
    </div>

    <div>
      <p><strong>Receipt #:</strong> <span id="receiptNo"></span></p>
      <p><strong>Customer:</strong> <span id="customerName">Walk-in Customer</span></p>
      <p><strong>Served by:</strong> <span id="salesPerson">Martha Kwaga</span></p>
    </div>

    <hr>

    <table class="table table-sm" id="receiptItems">
      <!-- Populated by JS -->
    </table>

    <div class="border-top pt-2">
      <div class="d-flex justify-content-between">
        <strong>Subtotal</strong>
        <span id="subTotal">UGX 0</span>
      </div>
      <div class="d-flex justify-content-between">
        <strong>Transport Fee</strong>
        <span id="transportFee">UGX 0</span>
      </div>
      <div class="d-flex justify-content-between fs-5 fw-bold border-top mt-2 pt-2">
        <strong>GRAND TOTAL</strong>
        <span id="grandTotal">UGX 0</span>
      </div>
    </div>

    <div class="text-center mt-4">
      <small>Thank you for shopping with Nyondo General Hardware!</small><br>
      <small>Goods sold are not returnable • Powered by Nyondo System</small>
    </div>
  </div>

  <div class="text-center no-print mt-3">
    <button onclick="window.print()" class="btn btn-success">Print Again</button>
  </div>

  <script>
    function generateAndPrintReceipt(saleData) {
      // Fill receipt details
      document.getElementById('receiptDate').textContent = new Date().toLocaleString('en-UG');
      document.getElementById('receiptNo').textContent = "NY-" + Date.now().toString().slice(-8);
      document.getElementById('customerName').textContent = saleData.customer || "Walk-in Customer";
      document.getElementById('salesPerson').textContent = saleData.salesPerson || "Sales Attendant";

      const tbody = document.getElementById('receiptItems');
      tbody.innerHTML = '';
      let subtotal = 0;

      saleData.items.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.product}</td>
          <td class="text-end">${item.qty} × ${item.price.toLocaleString()}</td>
          <td class="text-end">${item.total.toLocaleString()}</td>
        `;
        tbody.appendChild(row);
        subtotal += item.total;
      });

      const transport = saleData.transportFee || 0;
      const grandTotal = subtotal + transport;

      document.getElementById('subTotal').textContent = `UGX ${subtotal.toLocaleString()}`;
      document.getElementById('transportFee').textContent = `UGX ${transport.toLocaleString()}`;
      document.getElementById('grandTotal').textContent = `UGX ${grandTotal.toLocaleString()}`;

      // Auto print after a short delay
      setTimeout(() => {
        window.print();
      }, 800);
    }

    // For testing
    // generateAndPrintReceipt({
    //   customer: "John Mukasa",
    //   salesPerson: "Martha Kwaga",
    //   items: [{product: "Cement CEM II", qty: 10, price: 38500, total: 385000}],
    //   transportFee: 30000
    // });
  </script>
</body>
</html>
