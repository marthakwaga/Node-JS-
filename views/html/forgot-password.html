<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - Nyondo Hardware</title>

  <!-- MDB -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/mdb.min.css" />
  <link rel="stylesheet" href="/nyondo.css">
</head>

<body>
  <!-- Background Image -->
  <div class="bg-image d-flex align-items-center justify-content-center min-vh-100 p-4" 
       id="intro-example" 
       style="background-image: url('https://images.pexels.com/photos/4312849/pexels-photo-4312849.jpeg');">

    <!-- Dark Overlay -->
    <div class="mask mask-custom" style="background-color: rgba(25, 12, 36, 0.75);">
      
      <div class="d-flex justify-content-center align-items-center h-100">
        
        <!-- Forgot Password Card -->
        <div class="bg-danger bg-opacity-10 p-5 rounded-4 shadow-lg" 
             style="max-width: 420px; width: 100%; backdrop-filter: blur(8px);">

          <!-- Logo -->
          <div class="logo mx-auto mb-4" 
               style="background-image: url('/public/images/logo.png'); 
                      width: 150px; height: 150px; 
                      background-size: contain; 
                      background-repeat: no-repeat;">
          </div>

          <h3 class="text-center mb-3 text-white">Forgot Password?</h3>
          <p class="text-center text-white-50 mb-4">
            Enter your email address and we'll send you a link to reset your password.
          </p>

          <!-- Forgot Password Form -->
          <form>
            <!-- Email -->
            <div class="form-outline mb-4" data-mdb-input-init>
              <input type="email" id="email" class="form-control form-control-lg" placeholder="Enter your email" required />
              <label class="form-label text-white" for="email">Email Address</label>
            </div>

            <div class="text-center">
              <button type="submit" class="btn btn-outline-warning btn-lg px-5 mb-3">
                Send Reset Link
              </button>
            </div>

            <div class="text-center">
              <a href="index.html" class="text-white">← Back to Login</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.js"></script>
</body>
</html>
