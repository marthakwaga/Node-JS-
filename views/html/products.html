<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products & Stock - Nyondo Hardware</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/custom.css"/>
  <link rel="stylesheet" href="/css/nyondo.css"/>
</head>
<body>
  <div class="bg-image min-vh-100" style="background-image: url('https://images.pexels.com/photos/4312849/pexels-photo-4312849.jpeg');">
    <div class="mask" style="background-color: rgba(25, 12, 36, 0.78); min-height: 100vh;">

      <div class="d-flex h-100">
        <!-- Sidebar -->
        <nav class="sidebar p-3 text-white flex-shrink-0" style="width: 260px; background: rgba(26, 37, 47, 0.95);">
          <div class="text-center mb-4">
            <img src="/css/images/logo.png" alt="Nyondo Logo" style="height: 80px;">
            <h5 class="text-success mt-2">NYONDO HARDWARE</h5>
          </div>
          <hr>
          <ul class="nav flex-column">
            <li class="nav-item"><a href="dashboard.html" class="nav-link text-white"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="nav-item"><a href="products.html" class="nav-link text-white active"><i class="fas fa-boxes"></i> Products & Stock</a></li>
            <li class="nav-item"><a href="stock-in.html" class="nav-link text-white"><i class="fas fa-truck-loading"></i> Stock In</a></li>
            <li class="nav-item"><a href="sales.html" class="nav-link text-white"><i class="fas fa-shopping-cart"></i> Sales</a></li>
            <li class="nav-item"><a href="transport.html" class="nav-link text-white"><i class="fas fa-truck"></i> Transport</a></li>
            <li class="nav-item"><a href="deposits.html" class="nav-link text-white"><i class="fas fa-hand-holding-usd"></i> Deposits</a></li>
          </ul>
          <button onclick="logout()" class="btn btn-outline-light w-100 mt-4">Logout</button>
        </nav>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
          <div class="card shadow" style="background: rgba(255,255,255,0.95);">
            <div class="card-header bg-primary text-white">
              <h4><i class="fas fa-boxes"></i> Products & Current Stock</h4>
            </div>
            <div class="card-body">
              <input type="text" class="form-control mb-3" placeholder="Search products..." style="max-width: 400px;">

              <div class="table-responsive">
                <table class="table table-hover table-bordered">
                  <thead class="table-dark">
                    <tr>
                      <th>Product</th>
                      <th>Code</th>
                      <th>Category</th>
                      <th class="text-center">Stock Qty</th>
                      <th class="text-end">Cost Price</th>
                      <th class="text-end">Selling Price</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr><td>Cement CEM II</td><td>CEM001</td><td>Cement</td><td class="text-center">234</td><td class="text-end">35,000</td><td class="text-end">38,500</td><td><span class="badge bg-success">Good</span></td></tr>
                    <tr><td>12mm Iron Bar</td><td>IRN012</td><td>Iron Bars</td><td class="text-center">45</td><td class="text-end">28,000</td><td class="text-end">32,000</td><td><span class="badge bg-warning">Low</span></td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
