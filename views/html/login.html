    <div class="mask mask-custom" style="background-color: rgba(25, 12, 36, 0.7);">

        <!-- FORM -->
         <div class="bg-danger bg-opacity-10 p-4 rounded shadow" style="max-width: 600px; width: 50%; min: vh-100px">
          <div class="d-flex align-items-center justify-content-center justify-content-lg-start bg-white p-4 rounded shadow ">
            <p class="lead fw-normal mb-0 me-3">Continue sign in with</p>
            <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-tertiary btn-floating mx-1">

          </div>

          <div data-mdb-input-init class="form-outline mb-4 p-1">
            <input type="email" id="form3Example3" class="form-control form-control-lg"
              placeholder="Enter a valid email address" />
            <label class="form-label" for="form3Example3">Email address</label>
          </div>

          <!-- Password input -->
          <div data-mdb-input-init class="form-outline mb-4 p-1">
            <input type="password" id="form3Example4" class="form-control form-control-lg"
              placeholder="Enter password" />
            <label class="form-label" for="form3Example4">Password</label>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <!-- Checkbox -->
            <div class="form-check mb-0">
              <input class="form-check-input me-2" type="checkbox" value="" id="form2Example3" />
              <label class="form-check-label" for="form2Example3">

              </label>
            </div>
            <a href="forgot-password.pug" class="text-body">Forgot password?</a>
          </div>

          <div class="text-center text-lg-start mt-4 pt-2">

              style="padding-left: 2.5rem; padding-right: 2.5rem;">Login</button>
            <p class="small text-center-floating mt-2 pt-1 mb-0">Don't have an account? <a href="#!"
