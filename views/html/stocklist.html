<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/public/css/stocklist.css">
  <style>
  </style>
</head>
<body>

  <div class="full-bg">
    <div class="dark-overlay d-flex">

      <!-- Sidebar -->
      <nav class="sidebar p-3 text-white flex-shrink-0" style="width: 260px;">
        <div class="logo mx-auto mb-4 "></div>
        <ul class="nav flex-column">
          <li class="nav-item"><a href="manager-dashboard.html" class="nav-link text-white"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
          <li class="nav-item"><a href="stocklist.html" class="nav-link active text-white" ><i class="fas fa-list"></i> Stock List</a></li>
          <li class="nav-item "><a href="products.html" class="nav-link text-white"><i class="fas fa-boxes"></i> Products & Stock</a></li>
          <li class="nav-item"><a href="stock-registration.html" class="nav-link text-white"><i class="fas fa-truck-loading"></i> Stock In</a></li>
          <li class="nav-item"><a href="orders.html" class="nav-link text-white "><i class="fas fa-shopping-cart"></i> Sales</a></li>
          <li class="nav-item"><a href="deposits.html" class="nav-link text-white"><i class="fas fa-hand-holding-usd"></i> Deposit Scheme</a></li>
          <li class="nav-item"><a href="suppliers.html" class="nav-link text-white"><i class="fas fa-users"></i> Suppliers</a></li>
          <li class="nav-item"><a href="transport.html" class="nav-link text-white"><i class="fas fa-truck"></i> Transport</a></li>
          <li class="nav-item"><a href="reports.html" class="nav-link text-white"><i class="fas fa-chart-bar"></i> Reports</a></li>
        </ul>
        <button onclick="logout()" class="btn btn-outline-warning w-100 mt-4">Logout</button>
      </nav>

      <!-- Main Content -->
      <div class="flex-grow-1 p-4 overflow-auto">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h1 class="text-white fw-bold">📋 Stock List</h1>
          <a href="/stock/add_stock" class="btn btn-success btn-lg">
            <i class="fas fa-plus"></i> Add New Stock
          </a>
        </div>

        <!-- Filters & Search -->
        <div class="row mb-4">
          <div class="col-md-6">
            <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="🔍 Search by product name or code..." onkeyup="filterStock()">
          </div>
          <div class="col-md-3">
            <select id="categoryFilter" class="form-select form-select-lg" onchange="filterStock()">
              <option value="">All Categories</option>
              <option value="Finished Goods">Finished Goods</option>
              <option value="Raw Materials">Raw Materials</option>
              <option value="MRO Supplies">MRO Supplies</option>
            </select>
          </div>
          <div class="col-md-3">
            <select id="stockFilter" class="form-select form-select-lg" onchange="filterStock()">
              <option value="">All Stock Levels</option>
              <option value="low">Low Stock</option>
              <option value="out">Out of Stock</option>
            </select>
          </div>
        </div>

        <!-- Stock Table -->
        <div class="table-responsive">
          <table class="table table-hover align-middle text-white" id="stockTable">
            <thead class="table-dark">
              <tr>
                <th>Product Name</th>
                <th>Code</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Unit</th>
                <th>Cost Price</th>
                <th>Selling Price</th>
                <th>Supplier</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="stockBody">
              <!-- Populated by JavaScript -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script>
    // Sample Stock Data (Replace with database fetch later)
    let stockData = [
      { id: 1, name: "Cement CEM IIN", code: "CEM001", category: "Finished Goods", qty: 1240, unit: "Bags", cost: 25000, sell: 28000, supplier: "Cement Uganda LTD", status: "good" },
      { id: 2, name: "Iron Bars 12mm", code: "IB012", category: "Finished Goods", qty: 320, unit: "Pieces", cost: 18500, sell: 22000, supplier: "Steel Factory Depot", status: "good" },
      { id: 3, name: "Roofing Nails 5kg", code: "RN005", category: "MRO Supplies", qty: 23, unit: "Packs", cost: 12000, sell: 15000, supplier: "Nails & Wires Co.", status: "low" },
      { id: 4, name: "Iron Sheets Blue 28G", code: "IS028", category: "Finished Goods", qty: 0, unit: "Sheets", cost: 85000, sell: 95000, supplier: "Steel Factory Depot", status: "out" },
      { id: 5, name: "Wheelbarrows", code: "WB001", category: "Finished Goods", qty: 45, unit: "Pieces", cost: 65000, sell: 75000, supplier: "Heavy Tools LTD", status: "good" },
      { id: 6, name: "Barbed Wire", code: "BW001", category: "Raw Materials", qty: 85, unit: "Rolls", cost: 45000, sell: 52000, supplier: "Wire Uganda", status: "good" }
    ];

    function renderStock(data) {
      const tbody = document.getElementById('stockBody');
      tbody.innerHTML = '';

      data.forEach(item => {
        let statusHTML = '';
        if (item.status === 'low') {
          statusHTML = `<span class="badge bg-warning text-dark">Low Stock</span>`;
        } else if (item.status === 'out') {
          statusHTML = `<span class="badge bg-danger">Out of Stock</span>`;
        } else {
          statusHTML = `<span class="badge bg-success">In Stock</span>`;
        }

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.name}</td>
          <td><strong>${item.code}</strong></td>
          <td>${item.category}</td>
          <td class="fw-bold">${item.qty.toLocaleString()}</td>
          <td>${item.unit}</td>
          <td>UGX ${item.cost.toLocaleString()}</td>
          <td>UGX ${item.sell.toLocaleString()}</td>
          <td>${item.supplier}</td>
          <td>${statusHTML}</td>
          <td>
            <button class="btn btn-sm btn-outline-info me-1" onclick="editStock(${item.id})">Edit</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteStock(${item.id})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Search and Filter Function
    function filterStock() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      const stockLevel = document.getElementById('stockFilter').value;

      let filtered = stockData.filter(item => {
        const matchesSearch = item.name.toLowerCase().includes(searchTerm) || 
                             item.code.toLowerCase().includes(searchTerm);
        const matchesCategory = !category || item.category === category;
        const matchesStock = !stockLevel || 
                            (stockLevel === 'low' && item.status === 'low') ||
                            (stockLevel === 'out' && item.status === 'out');
        return matchesSearch && matchesCategory && matchesStock;
      });

      renderStock(filtered);
    }

    // Dummy functions for actions
    function editStock(id) {
      alert(`Editing stock item #${id} (Connect to form later)`);
    }

    function deleteStock(id) {
      if (confirm("Delete this stock item?")) {
        stockData = stockData.filter(item => item.id !== id);
        renderStock(stockData);
      }
    }

    function logout() {
      if (confirm("Logout?")) window.location.href = "login.html";
    }

    // Initialize
    window.onload = () => renderStock(stockData);
  </script>
</body>
</html>
